name: Release

on:
  push:
    tags:
      - "@flowlet/core@*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @flowlet/core
    runs-on: ubuntu-latest

    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run core:typecheck

      - name: Test
        run: npm run core:test

      - name: Build
        run: npm run core:build

      - name: Publish to npm
        run: npm publish -w @flowlet/core --provenance --access public